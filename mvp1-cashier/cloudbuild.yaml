# DomOS Cashier - Cloud Build CI/CD Pipeline
# Builds and deploys backend and frontend to Cloud Run
#
# Trigger: Push to main branch or manual trigger
# Required substitutions:
#   _REGION: Cloud Run region (e.g., europe-west3)
#   _CLOUD_SQL_CONNECTION: Cloud SQL connection name
#
# Required secrets (in Secret Manager):
#   domos-secret-key: Application secret key
#   domos-database-url: PostgreSQL connection string

steps:
  # ==========================================================================
  # Step 0: Print build info
  # ==========================================================================
  - id: 'build-info'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================"
        echo "DomOS Cashier CI/CD Pipeline"
        echo "========================================"
        echo "Project: $PROJECT_ID"
        echo "Region: ${_REGION}"
        echo "Commit: ${_TAG}"
        echo "Branch: $BRANCH_NAME"
        echo "Build ID: $BUILD_ID"
        echo "========================================"

  # ==========================================================================
  # Step 1: Build Backend Docker Image
  # ==========================================================================
  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    dir: 'mvp1-cashier/backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    waitFor: ['build-info']

  # ==========================================================================
  # Step 2: Build Frontend Docker Image
  # ==========================================================================
  - id: 'build-frontend'
    name: 'gcr.io/cloud-builders/docker'
    dir: 'mvp1-cashier/frontend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '--build-arg'
      - 'VITE_API_URL=/api'
      - '.'
    waitFor: ['build-info']

  # ==========================================================================
  # Step 3: Push Backend Image to Artifact Registry
  # ==========================================================================
  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend'
    waitFor: ['build-backend']

  # ==========================================================================
  # Step 4: Push Frontend Image to Artifact Registry
  # ==========================================================================
  - id: 'push-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend'
    waitFor: ['build-frontend']

  # ==========================================================================
  # Step 5: Deploy Backend to Cloud Run
  # ==========================================================================
  - id: 'deploy-backend'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'domos-cashier-backend'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'domos-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_CONNECTION}'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,DEBUG=false,INIT_DEMO_DATA=false,CORS_ORIGINS=https://domos-cashier-frontend-*.run.app'
      - '--set-secrets'
      - 'SECRET_KEY=domos-secret-key:latest,DATABASE_URL=domos-database-url:latest'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--port'
      - '8080'
      - '--no-allow-unauthenticated'
    waitFor: ['push-backend']

  # ==========================================================================
  # Step 6: Deploy Frontend to Cloud Run
  # ==========================================================================
  - id: 'deploy-frontend'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'domos-cashier-frontend'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60'
      - '--concurrency'
      - '200'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
    waitFor: ['push-frontend']

  # ==========================================================================
  # Step 7: Run Database Migrations (optional, manual trigger)
  # ==========================================================================
  # Uncomment to enable automatic migrations
  # - id: 'run-migrations'
  #   name: 'gcr.io/cloud-builders/gcloud'
  #   entrypoint: 'bash'
  #   args:
  #     - '-c'
  #     - |
  #       gcloud run jobs execute domos-migrations \
  #         --region=${_REGION} \
  #         --wait
  #   waitFor: ['deploy-backend']

  # ==========================================================================
  # Step 8: Print deployment URLs
  # ==========================================================================
  - id: 'print-urls'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================"
        echo "Deployment Complete!"
        echo "========================================"
        BURL=$$(gcloud run services describe domos-cashier-backend \
          --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo 'N/A')
        FURL=$$(gcloud run services describe domos-cashier-frontend \
          --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo 'N/A')
        echo "Backend URL: $$BURL"
        echo "Frontend URL: $$FURL"
        echo "========================================"
    waitFor: ['deploy-backend', 'deploy-frontend']

# Substitution variables with defaults
substitutions:
  _REGION: 'europe-west3'
  _CLOUD_SQL_CONNECTION: 'bionic-region-502615-h8:europe-west3:domos-db'
  _TAG: 'latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'

# Artifact images to store
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-backend:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/domos/cashier-frontend:latest'

# Build timeout (20 minutes)
timeout: '1200s'
