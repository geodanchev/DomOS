# DomOS Cashier MVP - Docker Compose Configuration
# Usage: docker compose up -d

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: domos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-domos_cashier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-domos_cashier}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - domos-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: domos-backend
    restart: unless-stopped
    environment:
      APP_NAME: "DomOS Cashier MVP"
      APP_VERSION: "1.0.0"
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-domos_cashier}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-long-random-string-at-least-32-chars}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ALGORITHM: HS256
      CORS_ORIGINS: '["http://localhost","http://localhost:3000","http://localhost:5173","http://frontend"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - domos-network

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: domos-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - domos-network

# Persistent volumes
volumes:
  postgres_data:
    driver: local

# Network configuration
networks:
  domos-network:
    driver: bridge
