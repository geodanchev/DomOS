# DomOS Cashier MVP - Development Docker Compose Configuration
# Usage: docker compose -f docker-compose.dev.yml up -d
# This configuration enables hot reload for development

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: domos-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-domos_cashier}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-domos_cashier}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - domos-network-dev

  # FastAPI Backend with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: domos-backend-dev
    restart: unless-stopped
    environment:
      APP_NAME: "DomOS Cashier MVP (Dev)"
      APP_VERSION: "1.0.0-dev"
      DEBUG: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-domos_cashier}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-not-for-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ALGORITHM: HS256
      CORS_ORIGINS: '["http://localhost","http://localhost:3000","http://localhost:5173","http://frontend:5173"]'
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - domos-network-dev

  # React Frontend with Vite hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: domos-frontend-dev
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - domos-network-dev

# Persistent volumes
volumes:
  postgres_data_dev:
    driver: local

# Network configuration
networks:
  domos-network-dev:
    driver: bridge
